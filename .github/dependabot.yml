version: 2
updates:
  # npm dependencies (pnpm)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      minor-and-patch:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      dependencies:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
